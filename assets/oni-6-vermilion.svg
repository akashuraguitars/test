<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">Oni-6 Vermilion concept guitar</title>
  <desc id="desc">A red and black aggressive six string electric guitar concept on a dark studio background.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#120305"/>
      <stop offset=".45" stop-color="#050505"/>
      <stop offset="1" stop-color="#33070a"/>
    </linearGradient>
    <linearGradient id="body" x1="0" x2="1">
      <stop offset="0" stop-color="#370306"/>
      <stop offset=".45" stop-color="#b1121c"/>
      <stop offset="1" stop-color="#050505"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)"/>
  <circle cx="215" cy="150" r="160" fill="#d0151f" opacity=".16"/>
  <circle cx="1010" cy="620" r="220" fill="#ffffff" opacity=".05"/>
