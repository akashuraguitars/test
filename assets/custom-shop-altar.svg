<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">Akashura custom shop finish board</title>
  <desc id="desc">A moody custom shop material and finish board for electric guitars.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#050505"/>
      <stop offset=".45" stop-color="#1f0507"/>
      <stop offset="1" stop-color="#0b0b0b"/>
    </linearGradient>
    <linearGradient id="red" x1="0" x2="1">
      <stop offset="0" stop-color="#4b0508"/>
      <stop offset=".55" stop-color="#d71924"/>
      <stop offset="1" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="bone" x1="0" x2="1">
      <stop offset="0" stop-color="#fff2d8"/>
      <stop offset=".65" stop-color="#7b7470"/>
      <stop offset="1" stop-color="#151515"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)"/>
  <g transform="translate(92 96)">
    <rect x="0" y="0" width="1016" height="608" fill="#000" opacity=".45" stroke="#fff" stroke-opacity=".12"/>
    <rect x="55" y="62" width="410" height="182" fill="url(#red)"/>
    <rect x="505" y="62" width="410" height="182" fill="url(#bone)"/>
    <rect x="55" y="292" width="260" height="210" fill="#101010" stroke="#e5e5e5" stroke-opacity=".25"/>
    <rect x="376" y="292" width="260" height="210" fill="#ede5d5"/>
    <rect x="697" y="292" width="218" height="210" fill="#57080d"/>
    <g stroke="#fff" stroke-opacity=".35">
      <line x1="88" y1="330" x2="282" y2="463"/>
      <line x1="96" y1="461" x2="280" y2="333"/>
      <line x1="410" y1="333" x2="602" y2="458"/>
      <line x1="415" y1="459" x2="604" y2="333"/>
      <line x1="725" y1="328" x2="889" y2="467"/>
      <line x1="726" y1="468" x2="888" y2="327"/>
    </g>
    <text x="55" y="548" fill="#fff" font-family="Arial, sans-serif" font-size="42" font-weight="900" letter-spacing="3">CUSTOM SHOP ALTAR</text>
    <text x="58" y="589" fill="#ff5961" font-family="Arial, sans-serif" font-size="18" letter-spacing="7">FINISH / HARDWARE / VOICING</text>
  </g>
</svg>
