            <p id="brand-slogan" class="w-full text-center text-[9px] md:text-xs text-gray-500 font-light uppercase mt-1 tracking-[0.26em] md:tracking-[0.43em] whitespace-nowrap pl-[0.26em] md:pl-[0.43em]">打造屬於演奏者的個性。</p>
        </div>

    <!-- 形象大圖 -->

        <div class="absolute inset-0 flex items-center">
            <div class="w-full max-w-6xl mx-auto px-8 md:px-12">

                <p class="max-w-xl mt-5 text-sm md:text-lg text-gray-200 font-light leading-relaxed">Akashura 以兩條清晰開發線打造現代電吉他：NEON BEATS 承接 Strat 系血統，AKSHURA 則走向更銳利的金屬琴輪廓、快速手感與舞台配色。</p>
                <div class="mt-7 flex flex-wrap gap-3">
                    <button onclick="renderConceptLine()" class="w-full sm:w-auto px-6 py-3 bg-red-700 hover:bg-red-600 text-white text-xs uppercase tracking-widest">查看開發型號</button>
                    <button onclick="renderNews()" class="w-full sm:w-auto px-6 py-3 border border-white/50 hover:border-white text-white text-xs uppercase tracking-widest">最新消息</button>

        </div>

    <div id="content-view" class="container mx-auto grid grid-cols-1 md:grid-cols-3 gap-6 md:gap-8 p-5 md:p-10">
    </div>

    <script>
        const client = contentful.createClient({
            space: 'w2up5vfofaou',
            environment: 'codex',
            accessToken: 'VGNRIRnLauegwmjZqzrm5zlceDtZt1Tq42PWr8Oh2Co'
        });

        const view = document.getElementById('content-view');

        const storyDropdown = document.getElementById('story-dropdown');

        function toggleProducts() { dropdown.classList.toggle('hidden'); storyDropdown.classList.add('hidden'); }

        function getImageUrl(fields) {
            const img = fields.image || fields.seriesImage || fields.subseriesImage;
            if (Array.isArray(img)) return img[0]?.fields?.file ? 'https:' + img[0].fields.file.url : null;
            return img?.fields?.file ? 'https:' + img.fields.file.url : 'https://images.unsplash.com/photo-1511379938547-c1f69419868d?w=300&q=80';
        }

        function getNewsImageUrl(fields) {
            const img = fields.image;
            if (Array.isArray(img)) return img[0]?.fields?.file ? 'https:' + img[0].fields.file.url : null;
            return img?.fields?.file ? 'https:' + img.fields.file.url : null;
        }

                        </div>
                    </div>
                </section>
            `;

                    <p class="text-[10px] uppercase tracking-[0.3em] text-red-500 mb-3">${item.subtitle}</p>
                    <h3 class="text-2xl font-black uppercase mb-4">${item.title}</h3>
                    <p class="text-sm leading-relaxed text-gray-300">${item.body}</p>

        function renderConceptLine() {
            hero.classList.add('hidden');
            dropdown.classList.add('hidden');
            storyDropdown.classList.add('hidden');

            view.innerHTML = `
                <section class="col-span-3 max-w-6xl mx-auto">
                    <div class="mb-8">
                        <p class="text-xs uppercase tracking-[0.4em] text-red-500 mb-3">Akashura 開發線</p>
                        <h1 class="text-4xl md:text-6xl font-black uppercase leading-none">從 NEON BEATS 到 AKSHURA 刀鋒。</h1>
                    </div>
                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-5 md:gap-6">${conceptCards()}</div>
                    <div class="mt-8 grid grid-cols-1 lg:grid-cols-[1fr_1fr] gap-8">

                            </div>

                    <div class="mt-8 bg-black/75 border border-white/10 p-8 md:p-10">

        async function initNav() {
            try {
                const catData = await client.getEntries({ content_type: 'category' });
                dropdown.innerHTML = catData.items.map(cat => `
                    <button onclick="renderSeries('${cat.sys.id}'); toggleProducts();" class="block w-full text-left px-4 py-2 hover:bg-gray-100 uppercase">${cat.fields.name || '未命名類別'}</button>
                `).join('');
                
                const storyData = await client.getEntries({ content_type: 'story' });
                storyDropdown.innerHTML = storyData.items.map(s => `
                    <button onclick="renderStory('${s.sys.id}'); toggleStory();" class="block w-full text-left px-4 py-2 hover:bg-gray-100 uppercase">${s.fields.brandStory || '品牌故事'}</button>
                `).join('');
                
                const siteData = await client.getEntries({ content_type: 'siteSettings', include: 1 });
                if (siteData.items.length > 0) {
                    const fields = siteData.items[0].fields;
                    const heroImg = document.getElementById('hero-image');
                    if (fields.heroImage && !heroImg.getAttribute('src')) heroImg.src = 'https:' + fields.heroImage.fields.file.url;
                    if (fields.brandName) brandImage.src = 'https:' + fields.brandName.fields.file.url;
                    if (fields.slogan) brandSlogan.textContent = fields.slogan;
                }
            } catch (err) { console.error(err); }
        }

        async function renderSeries(catId) {
            hero.classList.add('hidden');
            try {
                const data = await client.getEntries({ content_type: 'series' });
                const filtered = data.items.filter(s => s.fields.category?.sys?.id === catId);
                view.innerHTML = filtered.map(s => `
                    <div onclick="renderSubSeries('${s.sys.id}')" class="bg-white p-6 shadow-lg cursor-pointer hover:scale-105 transition rounded-xl text-center">
                        <img src="${getImageUrl(s.fields)}" class="w-full h-48 object-cover mb-4 rounded-lg">
                        <h2 class="text-xl font-bold uppercase text-red-600">${s.fields.series || '未命名系列'}</h2>
                    </div>
                `).join('');
            } catch (err) { console.error(err); }
        }

        async function renderSubSeries(seriesId) {
            try {
                const data = await client.getEntries({ content_type: 'subseries' });
                const filtered = data.items.filter(ss => {
                    const sId = Array.isArray(ss.fields.series) ? ss.fields.series[0]?.sys?.id : ss.fields.series?.sys?.id;
                    return sId === seriesId;
                });
                view.innerHTML = filtered.map(ss => `
                    <div onclick="renderProducts('${ss.sys.id}')" class="bg-white p-6 shadow-lg cursor-pointer hover:scale-105 transition rounded-xl text-center">
                        <img src="${getImageUrl(ss.fields)}" class="w-full h-48 object-cover mb-4 rounded-lg">
                        <h2 class="text-xl font-bold uppercase text-red-600">${ss.fields.name || ss.fields.subseriesName || '未命名子系列'}</h2>
                    </div>
                `).join('');
            } catch (err) { console.error(err); }
        }

        async function renderProducts(subSeriesId) {
            try {
                const data = await client.getEntries({ content_type: 'guitar' });
                const filtered = data.items.filter(g => {
                    const subId = Array.isArray(g.fields.subseries) ? g.fields.subseries[0]?.sys?.id : g.fields.subseries?.sys?.id;
                    return subId === subSeriesId;
                });
                if (filtered.length === 0) { view.innerHTML = '<p class="col-span-3 text-center uppercase">目前沒有產品。</p>'; return; }
                view.innerHTML = filtered.map(g => `
                    <a href="detail.html?id=${g.sys.id}" class="bg-white p-6 shadow-lg rounded-xl hover:scale-105 transition block">
                        <img src="${getImageUrl(g.fields)}" class="w-full h-64 object-cover mb-4 rounded-lg">
                        <h2 class="font-bold text-lg uppercase text-red-600">${g.fields.title || '未命名琴款'}</h2>
                    </a>
                `).join('');
            } catch (err) { console.error(err); }
        }

        async function renderStory(storyId) {
            hero.classList.add('hidden');
            const data = await client.getEntry(storyId);
            
            // 簡易 Rich Text 解析器
            const content = data.fields.storyBox.content.map(node => {
                if (node.nodeType === 'paragraph') {
                    return `<p class="mb-4 text-lg font-light leading-relaxed">${node.content.map(c => c.value).join('')}</p>`;
                }
                if (node.nodeType === 'embedded-asset-block') {
                    const url = 'https:' + node.data.target.fields.file.url;
                    return `<img src="${url}" class="w-full my-8 rounded-lg shadow-xl">`;
                }
                return '';
            }).join('');

            view.innerHTML = `<div class="col-span-3 bg-black/60 p-8 md:p-12 rounded-2xl border border-white/10 shadow-2xl backdrop-blur-sm max-w-4xl mx-auto">
                <h1 class="text-2xl md:text-3xl font-bold mb-10 uppercase tracking-widest text-red-600 border-b border-red-600/30 pb-6">${data.fields.brandStory}</h1>
                <div class="space-y-6">${content}</div>
            </div>`;
        }

        async function renderNews() {
            hero.classList.add('hidden');
            dropdown.classList.add('hidden');
            storyDropdown.classList.add('hidden');

            try {
                const data = await client.getEntries({
                    content_type: 'news',
                    order: '-fields.date'
                });

                if (data.items.length === 0) {
                    view.innerHTML = '<p class="col-span-3 text-center uppercase">目前還沒有消息。</p>';
                    return;
                }

                view.innerHTML = `
                    <section class="col-span-3 mb-2">
                        <p class="text-xs uppercase tracking-[0.4em] text-red-500 mb-3">Akashura 快訊</p>
                        <h1 class="text-4xl md:text-6xl font-black uppercase leading-none">來自工作室的消息</h1>
                    </section>
                    ${data.items.map(item => {
                    const fields = item.fields;
                    const imageUrl = getNewsImageUrl(fields);
                    const dateText = fields.date ? new Date(fields.date).toLocaleDateString('zh-TW', {
                        year: 'numeric',
                        month: 'long',
                        day: 'numeric'
                    }) : '';

                    return `
                        <article class="bg-white p-6 shadow-lg text-black">
                            ${imageUrl ? `<img src="${imageUrl}" class="w-full h-56 object-cover mb-5" alt="${fields.title || '消息圖片'}">` : '<img src="assets/custom-shop-altar.svg" class="w-full h-56 object-cover mb-5 bg-black" alt="Akashura 工作室視覺圖">'}
                            ${dateText ? `<p class="text-xs uppercase tracking-widest text-red-600 mb-3">${dateText}</p>` : ''}
                            <h2 class="text-2xl font-bold uppercase text-gray-900 mb-4">${fields.title || '未命名消息'}</h2>
                            <p class="text-gray-700 leading-relaxed">${fields.summary || ''}</p>
                        </article>
                    `;
                }).join('')}
                `;
            } catch (err) {
                console.error(err);
                view.innerHTML = '<p class="col-span-3 text-center text-red-500 uppercase">消息載入失敗。</p>';
            }
        }

        initNav();
        
        const urlParams = new URLSearchParams(window.location.search);
        const storyParam = urlParams.get('story');
        const newsParam = urlParams.get('news');
        const catParam = urlParams.get('cat');
        if (storyParam) {
            renderStory(storyParam);
        } else if (newsParam) {
            renderNews();
        } else if (catParam) {
            renderSeries(catParam);
        } else {
            renderHome();
        }
    </script>
</body>
</html>
